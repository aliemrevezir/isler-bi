# Production katmanı — base compose ile AÇIKÇA birlikte yüklenir.
# Dev override (docker-compose.override.yml) yalnız düz `docker compose up` ile otomatik gelir;
# aşağıdaki gibi -f ile dosyaları açıkça sayınca YÜKLENMEZ:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
#
# CI/CD: imajlar GitHub Actions'ta build edilip GHCR'a push edilir; VPS yalnız `pull` eder
# (prod'da build yok). Bkz. deploy/ci-cd-setup.md.
# TLS/80/443'ü mevcut sube-siparis Caddy'si yönetir; frontend paylaşımlı ağa bağlanır.
services:
  backend:
    image: ghcr.io/aliemrevezir/isler-bi-backend:latest
    pull_policy: always

  worker:
    image: ghcr.io/aliemrevezir/isler-bi-backend:latest
    pull_policy: always

  beat:
    image: ghcr.io/aliemrevezir/isler-bi-backend:latest
    pull_policy: always

  frontend:
    image: ghcr.io/aliemrevezir/isler-bi-frontend:latest
    pull_policy: always
    # default: backend'e /api proxy'si için. sube-siparis_default: dış Caddy erişimi için.
    networks:
      - default
      - sube-siparis_default

networks:
  # Base'in örtük "default" ağını sabit adreslemeye çekiyoruz.
  # 172.28.0.1 (gateway) VPS host'ta durur; ofisten gelen reverse-SSH tüneli
  # bu adrese 1433 bağlar, worker/beat LOGO_SERVER=172.28.0.1 ile Logo'ya ulaşır.
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
  # Mevcut sube-siparis Caddy'sinin bulunduğu ağ. Zaten var (sube-siparis stack'i oluşturdu).
  sube-siparis_default:
    external: true
