server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Docker'ın yerleşik DNS'i (127.0.0.11) + değişkenli upstream:
        # backend konteyneri yeniden başlayıp IP değiştirse bile her istekte
        # yeniden çözülür (aksi halde nginx IP'yi açılışta bir kez önbelleğe alır → 502).
        resolver 127.0.0.11 valid=10s;
        set $backend_host backend;
        proxy_pass http://$backend_host:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
