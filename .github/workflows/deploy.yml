name: build & deploy

# master'a her push'ta: imajları GHCR'a build+push et, sonra VPS'te pull+up.
on:
  push:
    branches: [master]
  workflow_dispatch: {}   # elle tetikleme (Actions sekmesinden)

concurrency:
  group: deploy-master
  cancel-in-progress: true

env:
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/isler-bi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # GHCR'a push için (GITHUB_TOKEN yeterli, ekstra secret yok)
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backend:latest
            ${{ env.IMAGE_BASE }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:latest
            ${{ env.IMAGE_BASE }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: VPS'te pull + up
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/isler-bi
            git pull --ff-only
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
            docker image prune -f
